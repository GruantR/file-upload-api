version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: fileflow_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fileflow_hub
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fileflow_network

  redis:
    image: redis:7-alpine
    container_name: fileflow_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fileflow_network

  minio:
    image: minio/minio:latest
    container_name: fileflow_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - fileflow_network

  app:
    build: .
    container_name: fileflow_app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: fileflow_hub
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: my-bucket
      SECRET_KEY: your_secret_key_change_me
      STORAGE_DRIVER: s3
      UPLOADS_PATH: ./uploads
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - fileflow_network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  fileflow_network:
    driver: bridge